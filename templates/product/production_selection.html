{% extends "base.html" %}
{% block content %}

<button class="btn btn-secondary mb-3" onclick="history.back()">Back</button>

<div class="container">

    <h2>Product Table</h2>

    <!-- Search -->
    <div class="filter-section">
        <input id="searchInput" type="text" placeholder="Search Product_Name..." />
    </div>

    <!-- Dropdown Filters -->
    <div class="dropdown-filters">

        <!-- Factory -->
        <div class="dropdown">
            <button class="dropbtn">Factory ▾</button>
            <div class="dropdown-content" id="factoryDropdown"></div>
        </div>

        <!-- Category -->
        <div class="dropdown">
            <button class="dropbtn">Category ▾</button>
            <div class="dropdown-content" id="categoryDropdown"></div>
        </div>

        <!-- Subcategory -->
        <div class="dropdown">
            <button class="dropbtn">Subcategory ▾</button>
            <div class="dropdown-content" id="subcategoryDropdown"></div>
        </div>

    </div>

    <!-- Table -->
    <table id="productTable">
        <thead>
        <tr>
            <th>Product_Name</th>
            <th>Factory</th>
            <th>Category</th>
            <th>Subcategory</th>
            <th>Open</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- Pagination -->
    <div class="pagination">
        <button id="prevPage">Previous</button>
        <span id="pageInfo"></span>
        <button id="nextPage">Next</button>
    </div>

</div>


<script>
// JSON data passed from Flask
const rawData = {{ table_json | safe }};

// Convert JSON columns → row objects
function jsonToRowData(jsonObj) {
    const keys = Object.keys(jsonObj);
    const rows = [];
    const len = Object.values(jsonObj[keys[0]]).length;

    for (let i = 0; i < len; i++) {
        let row = {};
        keys.forEach(k => row[k] = jsonObj[k][i]);
        rows.push(row);
    }
    return rows;
}

const tableData = jsonToRowData(rawData);

// Pagination
let currentPage = 1;
const rowsPerPage = 10;

// DOM references
const tbody = document.querySelector("#productTable tbody");
const searchInput = document.getElementById("searchInput");
const pageInfo = document.getElementById("pageInfo");

const prevBtn = document.getElementById("prevPage");
const nextBtn = document.getElementById("nextPage");

// Filter state
let filters = {
    Factory: [],
    Category: [],
    Subcategory: []
};

// Utility to create dropdown checkboxes
function buildDropdown(id, columnName) {
    const container = document.getElementById(id);
    const uniqueVals = [...new Set(tableData.map(x => x[columnName]))];

    // "All" option
    const allDiv = document.createElement("div");
    allDiv.innerHTML = `
        <label>
            <input type="checkbox" class="filter-checkbox" 
                   data-column="${columnName}" 
                   data-value="__all__"
                   checked>
            All
        </label>
    `;
    container.appendChild(allDiv);

    // Individual values
    uniqueVals.forEach(val => {
        const div = document.createElement("div");
        div.innerHTML = `
            <label>
                <input type="checkbox" class="filter-checkbox" 
                       data-column="${columnName}" 
                       data-value="${val}">
                ${val}
            </label>
        `;
        container.appendChild(div);
    });
}

// Initialize dropdowns
buildDropdown("factoryDropdown", "Factory");
buildDropdown("categoryDropdown", "Category");
buildDropdown("subcategoryDropdown", "Subcategory");

// Handle filter logic
document.addEventListener("change", e => {
    if (!e.target.classList.contains("filter-checkbox")) return;

    const col = e.target.dataset.column;
    const val = e.target.dataset.value;

    if (val === "__all__") {
        // Selecting "All" resets all filters for that column
        filters[col] = [];
        const checkboxes = document.querySelectorAll(`input[data-column="${col}"]`);
        checkboxes.forEach(cb => cb.checked = (cb.dataset.value === "__all__"));
    } else {
        // Uncheck "All" when selecting specific values
        const allBox = document.querySelector(`input[data-column="${col}"][data-value="__all__"]`);
        allBox.checked = false;

        // Toggle value in filter state
        if (filters[col].includes(val)) {
            filters[col] = filters[col].filter(v => v !== val);
        } else {
            filters[col].push(val);
        }

        // If none selected → revert to "All"
        if (filters[col].length === 0) {
            allBox.checked = true;
        }
    }

    currentPage = 1;
    renderTable();
});

// Filtering logic
function getFilteredData() {
    const text = searchInput.value.toLowerCase();

    return tableData.filter(row => {

        if (text && !row.Product_Name.toLowerCase().includes(text)) return false;

        // For each column filter
        for (let col of ["Factory", "Category", "Subcategory"]) {
            const active = filters[col];

            // No filter selected for the column → allow all
            if (active.length === 0) continue;

            if (!active.includes(row[col])) return false;
        }

        return true;
    });
}

// Render table with pagination
function renderTable() {
    const filtered = getFilteredData();

    const start = (currentPage - 1) * rowsPerPage;
    const end = start + rowsPerPage;
    const pageRows = filtered.slice(start, end);

    tbody.innerHTML = "";

    pageRows.forEach(row => {

        const productUrl = `/product/${encodeURIComponent(row.Product_Name)}`;

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${row.Product_Name}</td>
            <td>${row.Factory}</td>
            <td>${row.Category}</td>
            <td>${row.Subcategory}</td>
            <td>
                <form method="POST" action="/product/${encodeURIComponent(row.Product_Name)}" style="margin:0;">
                    <input type="hidden" name="factory" value="${row.Factory}">
                    <input type="hidden" name="category" value="${row.Category}">
                    <input type="hidden" name="subcategory" value="${row.Subcategory}">
                    <button type="submit" class="open-btn">View</button>
                </form>
            </td>
        `;


        tbody.appendChild(tr);
    });


    pageInfo.textContent = `Page ${currentPage} of ${Math.ceil(filtered.length / rowsPerPage)}`;
}

// Pagination controls
prevBtn.onclick = () => {
    if (currentPage > 1) {
        currentPage--;
        renderTable();
    }
};
nextBtn.onclick = () => {
    const total = Math.ceil(getFilteredData().length / rowsPerPage);
    if (currentPage < total) {
        currentPage++;
        renderTable();
    }
};

// Live search
searchInput.addEventListener("input", () => {
    currentPage = 1;
    renderTable();
});

// Init render
renderTable();
</script>

<style>
.container {
    padding: 20px;
    max-width: 1100px;
}

/* Search box */
#searchInput {
    width: 280px;
    padding: 7px;
    font-size: 15px;
}

/* Dropdown filters layout */
.dropdown-filters {
    display: flex;
    gap: 20px;
    margin: 15px 0;
}

/* Dropdown */
.dropdown {
    position: relative;
    display: inline-block;
}
.dropbtn {
    padding: 8px 12px;
    background: #f3f3f3;
    border: 1px solid #ccc;
    cursor: pointer;
}
.dropdown-content {
    display: none;
    position: absolute;
    background-color: #fff;
    min-width: 180px;
    border: 1px solid #ccc;
    z-index: 1;
    padding: 10px;
    max-height: 220px;
    overflow-y: auto;
}
.dropdown:hover .dropdown-content {
    display: block;
}

/* Table */
#productTable {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}
#productTable th, #productTable td {
    border: 1px solid #ddd;
    padding: 8px;
}
#productTable th {
    background: #f1f1f1;
}
#productTable tr:nth-child(even) {
    background: #fafafa;
}

/* Pagination */
.pagination {
    margin-top: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.open-btn{
    background:#4CAF50;
    color:white;
    padding:6px 12px;
    text-decoration:none;
    border-radius:6px;
    font-size:14px;
    transition:0.2s;
}

.open-btn:hover{
    background:#3b9140;
}

</style>

{% endblock %}
