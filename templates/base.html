<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Cost Determination System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-wrapper">
        <!-- Mobile toggle button -->
        <button class="sidebar-toggle d-lg-none btn btn-primary position-fixed" 
                id="sidebarToggle" 
                aria-label="Toggle sidebar"
                style="bottom: 20px; right: 20px; z-index: 1050; border-radius: 50%; width: 50px; height: 50px;">
            <i class="fas fa-bars"></i>
        </button>

        <div class="d-flex flex-column flex-lg-row min-vh-100">
            <!-- Sidebar with responsive behavior -->
            <aside class="sidebar" id="mainSidebar">
                {% include 'components/sidebar.html' %}
            </aside>

            <!-- Main content area -->
            <div class="main-content flex-grow-1 d-flex flex-column">
                {% include 'components/header.html' %}
                
                <main class="flex-grow-1">
                    <div class="container-fluid px-3 px-sm-4 px-lg-5 py-3 py-sm-4">
                        {% block content %}{% endblock %}
                    </div>
                </main>

                <footer class="footer mt-auto">
                    <div class="container-fluid text-center py-3">
                        <span>© 2026 Copy Right By B. Heydari</span>
                    </div>
                </footer>
            </div>
        </div>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    <script>
        // Mobile sidebar toggle functionality
        const sidebar = document.getElementById('mainSidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const toggleBtn = document.getElementById('sidebarToggle');

        if (toggleBtn && sidebar && overlay) {
            toggleBtn.addEventListener('click', function() {
                sidebar.classList.toggle('show');
                overlay.classList.toggle('show');
                document.body.classList.toggle('sidebar-open');
            });

            overlay.addEventListener('click', function() {
                sidebar.classList.remove('show');
                overlay.classList.remove('show');
                document.body.classList.remove('sidebar-open');
            });

            // Close sidebar on window resize if becoming desktop view
            window.addEventListener('resize', function() {
                if (window.innerWidth >= 992) {
                    sidebar.classList.remove('show');
                    overlay.classList.remove('show');
                    document.body.classList.remove('sidebar-open');
                }
            });
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
